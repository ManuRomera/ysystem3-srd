name: Crear Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Publicar Release en GitHub
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Leer versión desde system.json
        id: version
        shell: bash
        run: |
          VERSION=$(jq -r '.version' system.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verificar que el tag coincide con la versión en system.json
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION="${{ steps.version.outputs.version }}"
          if [ "$TAG" != "$VERSION" ]; then
            echo "ERROR: El tag (v$TAG) no coincide con la versión en system.json ($VERSION)"
            echo "Actualiza la versión en system.json antes de crear el tag."
            exit 1
          fi

      - name: Validar system.json
        shell: bash
        run: |
          jq empty system.json
          test "$(jq -r '.id' system.json)" = "ysystem3-srd"
          test "$(jq -r '.download' system.json)" = "https://github.com/ManuRomera/ysystem3-srd/releases/download/v${{ steps.version.outputs.version }}/ysystem3-srd.zip"

      - name: Crear archivo zip del sistema
        shell: bash
        run: |
          mkdir -p dist/ysystem3-srd
          rsync -av ./ dist/ysystem3-srd/ \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'dist' \
            --exclude '.DS_Store' \
            --exclude '._*' \
            --exclude '__MACOSX' \
            --exclude '*.log'
          cd dist
          zip -r "ysystem3-srd.zip" ysystem3-srd
          cd ..
          ls -lh dist/ysystem3-srd.zip

      - name: Extraer notas de la versión desde CHANGELOG.md
        id: changelog
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES=$(awk "/^## \[$VERSION\]/,/^## \[/{if(/^## \[/ && !/^## \[$VERSION\]/) exit; print}" CHANGELOG.md | tail -n +2)
          if [ -z "$NOTES" ]; then
            NOTES="Release de la versión $VERSION."
          fi
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Crear Release en GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          name: "YSYSTEM3 SRD v${{ steps.version.outputs.version }}"
          body: |
            ## YSYSTEM3 SRD para Foundry VTT — versión ${{ steps.version.outputs.version }}

            ### Instalación

            Pega esta URL en Foundry VTT → Sistemas → Instalar sistema → URL del Manifiesto:

            ```
            https://raw.githubusercontent.com/ManuRomera/ysystem3-srd/main/system.json
            ```

            ### Notas de esta versión

            ${{ steps.changelog.outputs.notes }}

            ---

            > ⚠️ Este es un sistema **no oficial**. No está afiliado ni aprobado por Walhalla Ediciones.
          files: dist/ysystem3-srd.zip
          draft: false
          prerelease: false
          make_latest: true
